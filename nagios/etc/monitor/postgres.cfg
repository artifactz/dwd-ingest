define host {
  use             linux-server
  host_name       postgres
  alias           PostgreSQL
  address         postgres
}

define service {
  use                     generic-service
  host_name               postgres
  service_description     PostgreSQL: Connection Test
  check_interval          5
  retry_interval          1
  max_check_attempts      3
  check_command           check_pgactivity!connection!0!0
}

define service {
  use                     generic-service
  host_name               postgres
  service_description     PostgreSQL: Number of Connections
  check_interval          5
  retry_interval          1
  max_check_attempts      3
  check_command           check_pgactivity!backends!6!20
}

define service {
  use                     generic-service
  host_name               postgres
  service_description     PostgreSQL: DB Size
  check_interval          5
  retry_interval          1
  max_check_attempts      3
  check_command           check_pgactivity!database_size!'size=10gb,delta=200mb'!'size=20gb,delta=500mb'
}
